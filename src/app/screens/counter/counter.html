<div class="flex flex-col gap-6"> 
    <app-title title="Counter example" subtitle="Counter implementation"></app-title>
    <div class="flex items-center gap-2">
        <span class="text-zinc-400">Count: {{ count() }}</span>

        <button class="ml-2 bg-zinc-700 text-zinc-200 px-2 py-1 rounded hover:bg-zinc-600" (click)="add()">Add</button>
        <button class="ml-2 bg-zinc-700 text-zinc-200 px-2 py-1 rounded hover:bg-zinc-600" (click)="sub()">Subtract</button>
    </div>
</div>
